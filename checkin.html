<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>受付スキャナー</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body { background:#0e1a16; color:#fff; background-image:none; }
  .scan { max-width:560px; margin:0 auto; padding:14px 16px 40px; }
  .hdr { display:flex; justify-content:space-between; align-items:center; padding:6px 2px 12px; }
  .hdr .t { font-weight:800; color:#fff; } .hdr .t small{ color:#8fb0a4; font-weight:400; }
  .hdr button { background:none;border:1px solid #33463d;color:#cfe3d8;padding:8px 12px;border-radius:8px;font-size:.82rem;cursor:pointer; }
  #reader { border-radius:16px; overflow:hidden; background:#000; }
  #reader video { width:100% !important; display:block; }
  .count { text-align:center; color:#9fb3a8; font-size:.9rem; margin:12px 0; }
  .toggle { width:100%; margin-top:10px; padding:12px; border-radius:10px; border:1px solid #33463d;
    background:#13241e; color:#cfe3d8; font-weight:700; cursor:pointer; font-family:inherit; }
  /* 手動パネル */
  #manual { display:none; margin-top:12px; background:#13241e; border:1px solid #26382f; border-radius:12px; padding:14px; }
  #manual input { width:100%; padding:12px; border-radius:10px; border:1px solid #33463d; background:#0e1a16; color:#fff; font-size:16px; }
  .hit { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid #26382f; }
  .hit .nm { font-weight:700; } .hit .sub { color:#8fb0a4; font-size:.8rem; }
  .hit button { padding:8px 12px; border-radius:8px; border:none; font-weight:700; cursor:pointer; font-family:inherit; }
  .do-in { background:#16a34a; color:#fff; } .do-un { background:#3a4a43; color:#fff; }
  /* ログイン */
  .login { max-width:380px; margin:44px auto; }
  .login input { margin-bottom:10px; }
  /* 全画面フィードバック */
  #ov { position:fixed; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; z-index:50; }
  #ov .ic { font-size:4.5rem; line-height:1; } #ov .bg { font-size:2.4rem; font-weight:800; margin:10px 0 4px; }
  #ov .sm { font-size:1.1rem; opacity:.92; }
  .ok{background:#16a34a} .already{background:#d97706} .bad{background:#dc2626}
</style>
</head>
<body>
<!-- ログイン -->
<div class="login card" id="loginBox" style="color:var(--ink)">
  <div class="section-title"><span>受付スタッフ</span></div>
  <p class="lead">配布されたアカウントでログインしてください。</p>
  <input id="email" type="email" placeholder="メールアドレス" autocomplete="username" />
  <input id="password" type="password" placeholder="パスワード" autocomplete="current-password" />
  <div id="loginErr" class="error-box" style="display:none"></div>
  <button id="loginBtn" class="btn">ログインしてスキャン開始</button>
</div>

<!-- スキャナー -->
<div class="scan" id="scanBox" style="display:none">
  <div class="hdr">
    <div class="t">🎪 受付 <small id="who"></small></div>
    <button id="logout">ログアウト</button>
  </div>
  <div id="reader"></div>
  <div class="count" id="count">受付 0 件</div>
  <button class="toggle" id="toggleManual">QRが読めない時（名前で手動受付）</button>

  <div id="manual">
    <input id="q" placeholder="名前・電話・メールで検索" />
    <div id="hits"></div>
  </div>
</div>

<!-- フィードバック -->
<div id="ov"><div class="ic" id="ovIc"></div><div class="bg" id="ovName"></div><div class="sm" id="ovMsg"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="firebase-config.js"></script>
<script>
  firebase.initializeApp(window.firebaseConfig);
  const auth = firebase.auth(), db = firebase.firestore();
  db.enablePersistence({ synchronizeTabs:true }).catch(()=>{}); // 会場Wi-Fi対策
  const $ = id => document.getElementById(id);
  let user=null, scanner=null, busy=false, lastCode="", lastTime=0, audioCtx=null, cache=[];

  $("loginBtn").onclick = async () => {
    $("loginErr").style.display="none";
    try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){}
    try { await auth.signInWithEmailAndPassword($("email").value.trim(), $("password").value); }
    catch(e){ $("loginErr").textContent="ログインに失敗しました。"; $("loginErr").style.display="block"; }
  };
  $("logout").onclick = () => auth.signOut();

  auth.onAuthStateChanged(async u => {
    user = u;
    if (u) {
      $("loginBox").style.display="none"; $("scanBox").style.display="block"; $("who").textContent=u.email;
      await warm(); await refresh(); startScanner();
    } else {
      $("loginBox").style.display="block"; $("scanBox").style.display="none";
      if (scanner){ scanner.stop().catch(()=>{}); scanner=null; }
    }
  });

  async function warm(){ try { const s = await db.collection("registrations").get();
    cache = s.docs.map(d=>({id:d.id,...d.data()})); } catch(_){} }
  async function refresh(){ try {
    const s = await db.collection("registrations").where("checkedIn","==",true).get();
    $("count").textContent = "受付 " + s.size + " 件"; } catch(_){}
  }

  // --- スキャナー ---
  function startScanner(){
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode:"environment" }, { fps:10, qrbox:{width:260,height:260} }, onScan, ()=>{})
      .catch(err => alert("カメラを起動できませんでした。カメラ許可をご確認ください。\n"+err));
  }
  async function onScan(text){
    const now = Date.now();
    if (busy) return;
    if (text===lastCode && now-lastTime<3000) return;
    lastCode=text; lastTime=now; busy=true;
    const id = extractId(text);
    show(await checkIn(id)); await refresh();
    setTimeout(()=>{ $("ov").style.display="none"; busy=false; }, 1600);
  }
  function extractId(t){ try{ const u=new URL(t); const q=u.searchParams.get("id"); if(q) return q; }catch(_){} return t.trim(); }

  async function checkIn(id){
    const ref = db.collection("registrations").doc(id);
    let snap; try { snap = await ref.get(); } catch(e){ return {status:"error"}; }
    if (!snap.exists) return {status:"notfound"};
    const d = snap.data();
    if (d.checkedIn) return {status:"already", name:d.name, slot:d.slot};
    try { await ref.update({ checkedIn:true, checkedInAt:firebase.firestore.FieldValue.serverTimestamp(), checkedInBy:user.email }); }
    catch(e){ return {status:"error"}; }
    return {status:"ok", name:d.name, slot:d.slot};
  }

  // --- 手動受付・修正 ---
  $("toggleManual").onclick = () => {
    const m = $("manual"); const open = m.style.display!=="block";
    m.style.display = open ? "block" : "none";
    if (open){ warm(); $("q").focus(); }
  };
  $("q").addEventListener("input", () => {
    const q = $("q").value.trim().toLowerCase();
    const hits = !q ? [] : cache.filter(r => [r.name,r.tel,r.email].some(v=>(v||"").toLowerCase().includes(q))).slice(0,8);
    $("hits").innerHTML = hits.map(r =>
      '<div class="hit"><div><div class="nm">'+esc(r.name)+(r.checkedIn?' ✓':'')+'</div>'+
      '<div class="sub">'+esc(r.slot)+' ・ '+esc(r.tel||"")+'</div></div>'+
      (r.checkedIn ? '<button class="do-un" data-un="'+r.id+'">受付取消</button>'
                   : '<button class="do-in" data-in="'+r.id+'">受付する</button>')+'</div>').join("")
      || '<div class="sub" style="color:#8fb0a4;padding:8px 4px">該当なし</div>';
    $("hits").querySelectorAll("[data-in]").forEach(b=>b.onclick=()=>manualSet(b.dataset.in,true));
    $("hits").querySelectorAll("[data-un]").forEach(b=>b.onclick=()=>manualSet(b.dataset.un,false));
  });
  async function manualSet(id,val){
    await db.collection("registrations").doc(id).update({
      checkedIn:val, checkedInAt: val?firebase.firestore.FieldValue.serverTimestamp():null,
      checkedInBy: val?user.email:null });
    const r = cache.find(x=>x.id===id); if(r) r.checkedIn=val;
    $("q").dispatchEvent(new Event("input")); refresh();
  }

  // --- フィードバック ---
  function show(r){
    const ov=$("ov"); ov.className="";
    if (r.status==="ok"){ ov.classList.add("ok"); $("ovIc").textContent="✓"; $("ovName").textContent=r.name+" 様"; $("ovMsg").textContent="受付完了 ・ "+(r.slot||""); beep(880); vib([120]); }
    else if (r.status==="already"){ ov.classList.add("already"); $("ovIc").textContent="!"; $("ovName").textContent=r.name+" 様"; $("ovMsg").textContent="すでに受付済みです"; beep(440); vib([80,60,80]); }
    else if (r.status==="notfound"){ ov.classList.add("bad"); $("ovIc").textContent="×"; $("ovName").textContent="未登録のQR"; $("ovMsg").textContent="予約が見つかりません"; beep(220); vib([200]); }
    else { ov.classList.add("bad"); $("ovIc").textContent="×"; $("ovName").textContent="エラー"; $("ovMsg").textContent="通信状態をご確認ください"; beep(220); vib([200]); }
    ov.style.display="flex";
  }
  function beep(f){ if(!audioCtx) return; try{ const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(.15,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.25);
    o.start(); o.stop(audioCtx.currentTime+.25);}catch(_){} }
  function vib(p){ if(navigator.vibrate) navigator.vibrate(p); }
  function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
